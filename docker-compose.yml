services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: moxie_db
      POSTGRES_USER: rusansan
      POSTGRES_PASSWORD: 10042801
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./docs/backend
    env_file:
    - ./docs/backend/.env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://rusansan:10042801@db:5432/moxie_db
    depends_on:
      - db

  web:
    image: caddy:2
    ports:
      - "80:80"
    volumes:
      - ./docs:/usr/share/caddy:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  db_data: