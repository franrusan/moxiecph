<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Moxie — Admin</title>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<div class="page-wrap">

  <!-- Header -->
  <div class="page-header">
    <div class="logo-dot"></div>
    <h1>Moxie Admin</h1>
  </div>

  <!-- Rezervacije po datumu -->
  <div class="card">
    <div class="card-title">Rezervacije po datumu</div>

    <div class="controls">
      <label for="d">Datum</label>
      <input id="d" type="date"/>
      <button id="load">Učitaj</button>
      <span id="sum" class="pill"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Vrijeme</th>
            <th>Ukupno gostiju</th>
            <th>Grupe</th>
          </tr>
        </thead>
        <tbody id="tb">
          <tr><td colspan="3" class="muted">Odaberi datum i klikni "Učitaj".</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Stats -->
  <div class="card">
    <div class="card-title">Statistike prometa</div>

    <div class="filter-row">
      <span class="label">Filter:</span>
      <span id="filterState" class="pill"></span>
      <button id="resetFilters">Reset</button>
    </div>

    <div class="stats-grid">
      <div class="panel">
        <div class="panel-title">Promet po danima u tjednu</div>
        <div class="chart-wrap">
          <canvas id="chartDow"></canvas>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Promet po terminima</div>
        <div class="chart-wrap">
          <canvas id="chartTime"></canvas>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="admin.js"></script>
</body>
</html>
